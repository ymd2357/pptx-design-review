name: Deploy review web

on:
  push:
    branches:
      - master
    paths:
      - "web/**"
      - "doc/reviews/**"
      - "tmp/review-snapshot/**"
      - ".github/workflows/deploy-review-web.yml"
  workflow_dispatch:

concurrency:
  group: review-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Stage publish tree
        run: |
          rm -rf publish-tree
          mkdir -p publish-tree
          cp -R web/dist/. publish-tree/

          mkdir -p publish-tree/doc/reviews
          cp -R doc/reviews/. publish-tree/doc/reviews/

          if [ -d tmp/review-snapshot ]; then
            mkdir -p publish-tree/tmp/review-snapshot
            cp -R tmp/review-snapshot/. publish-tree/tmp/review-snapshot/
          fi

          touch publish-tree/.nojekyll

      - name: Push to review-pages branch
        run: |
          cd publish-tree
          git init -q -b review-pages
          git config user.name "review-pages-bot"
          git config user.email "review-pages-bot@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          git commit -q -m "review-pages: ${GITHUB_SHA::7} on ${GITHUB_REF##*/}"
          git push -q --force origin "HEAD:refs/heads/review-pages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
