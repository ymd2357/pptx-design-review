  imagery:
    min_px:
      full_bleed_bg:
        w: 1920
        h: 1080
      half_width:
        w: 960
        h: 540

    photo_tone:
      allowed_subjects:
        - "workplace"
        - "people"
        - "product_ui"
        - "process"
        - "abstract_texture"
      treatment:
        color_mode: "full_color"
        saturation: "natural"
        contrast: "medium"
        brightness: "medium_to_high"
        crop_style: "editorial_clear_subject"
      prohibited:
        - "heavy_filter"
        - "low_resolution_stock_artifact"
        - "busy_background_under_text"
        - "decorative_blur_only"
        - "unrelated_atmospheric_photo"
      review_required_when:
        - "faces_are_identifiable"
        - "licensed_or_third_party_asset"
        - "medical_or_sensitive_context"

    scaling:
      avoid_upscale_over_ratio: 1.0
      crop_allowed: true
      preserve_aspect_ratio: true
      min_visible_subject_ratio: 0.70

    text_on_photo:
      allowed: true
      allowed_text_styles:
        - "rules.typography.text_styles.title"
        - "rules.typography.text_styles.heading"
        - "rules.typography.text_styles.body"
      placement:
        safe_text_area_required: true
        avoid_subject_overlap: true
        min_edge_margin_pt: "tokens.semantic.space_pt.md"
      overlay:
        color: "tokens.value.color.overlay_black"
        color_hex: "#000000"
        opacity_range: [0.40, 0.60]
        default_opacity: 0.50
      contrast:
        source_of_truth: "rules.accessibility.contrast_ratio_min"
        require_measured_after_overlay: true
      prohibited:
        - "text_directly_on_busy_photo_without_overlay"
        - "text_crossing_face_or_primary_subject"

    corners:
      allowed_radius_pt:
        - "tokens.semantic.shapes.radius_pt.none"
        - "tokens.semantic.shapes.radius_pt.sm"
        - "tokens.semantic.shapes.radius_pt.md"
      default_radius_pt: "tokens.component.image_with_caption.radius_pt"
      full_bleed_radius_pt: "tokens.semantic.shapes.radius_pt.none"
      screenshot_radius_pt: "tokens.semantic.shapes.radius_pt.sm"

    caption:
      required_when:
        - "image_contains_data"
        - "image_needs_source"
        - "screenshot_context_is_not_self_evident"
        - "photo_meaning_is_not_obvious"
      optional_when:
        - "purely_decorative"
        - "same_slide_heading_explains_image"
      type: "caption"
      text_style: "rules.typography.text_styles.caption"
      size_pt: 20
      line_height_pt: 24
      margin_top_pt: 6
      color: "tokens.semantic.color.text.muted"
      max_lines: 2
      placement: "below_image"

    source:
      required_for:
        - "third_party_photo"
        - "stock_photo"
        - "screenshot"
        - "chart_export"
        - "external_logo"
      decorative_internal_assets_may_omit: true
      placement:
        default: "caption_suffix"
        alternatives:
          - "speaker_notes"
          - "appendix_sources_slide"
      fields:
        - "asset_id_or_file_name"
        - "owner_or_provider"
        - "license_or_usage_basis"
        - "retrieved_or_created_date"
      missing_source_policy: "replace_or_remove_before_final"

    formats:
      preferred:
        photo: "jpg"
        screenshot: "png"
        icon: "svg_or_png"
        transparent_cutout: "png"
      accepted:
        - "jpg"
        - "jpeg"
        - "png"
        - "svg"
      discouraged:
        - "gif"
        - "webp"
        - "bmp"
        - "tiff"
      export:
        raster_dpi_min: 144
        preserve_transparency_for_png: true
        embed_original_source_when_editable: false

  shapes:
    corner_radius:
      allowed_pt:
        - "tokens.semantic.shapes.radius_pt.none"
        - "tokens.semantic.shapes.radius_pt.sm"
        - "tokens.semantic.shapes.radius_pt.md"
        - "tokens.semantic.shapes.radius_pt.lg"
      default_pt: "tokens.semantic.shapes.radius_pt.md"
      full_bleed_shape_pt: "tokens.semantic.shapes.radius_pt.none"
      note: "Use lg only for large panels; use none for background geometry."
    stroke:
      allowed_width_pt:
        - "tokens.semantic.shapes.stroke_width_pt.sm"
        - "tokens.semantic.shapes.stroke_width_pt.md"
        - "tokens.semantic.shapes.stroke_width_pt.lg"
      default_width_pt: "tokens.semantic.shapes.stroke_width_pt.sm"
      allowed_dash:
        - "tokens.semantic.shapes.stroke_dash.solid"
      default_dash: "tokens.semantic.shapes.stroke_dash.solid"
      allowed_colors:
        - "tokens.semantic.color.border.default"
        - "tokens.semantic.color.accent.magenta"
        - "tokens.semantic.color.state.info"
        - "tokens.semantic.color.state.success"
        - "tokens.semantic.color.state.warning"
        - "tokens.semantic.color.state.danger"
      default_color: "tokens.semantic.color.border.default"
      prohibit_decorative_heavy_outlines: true
    fill:
      default_color: "tokens.semantic.color.background.muted"
      allowed_colors:
        - "tokens.semantic.color.background.base"
        - "tokens.semantic.color.background.muted"
        - "tokens.semantic.color.neutral.n200"
        - "tokens.semantic.color.accent.magenta"
        - "tokens.semantic.color.brand.primary"
        - "tokens.semantic.color.brand.black"
        - "tokens.semantic.color.brand.secondary"
        - "tokens.semantic.color.brand.gradient"
        - "tokens.semantic.color.brand.gold"
      accent_fill_area_source: "rules.color.accent_area"
    shadow:
      allowed: false
      allowed_tokens:
        - "tokens.semantic.shapes.shadow.none"
      reason: "Disable shadows to keep PPTX rendering stable across PowerPoint and PDF export."
      replacement: "Use border, background tint, or spacing to separate layers."
    divider:
      component: "tokens.component.divider"
      allowed_width_pt:
        - "tokens.semantic.shapes.divider.width_pt"
      allowed_color:
        - "tokens.semantic.shapes.divider.color"
      allowed_dash:
        - "tokens.semantic.shapes.stroke_dash.solid"
      min_margin_top_pt: "tokens.semantic.shapes.divider.margin_y_pt"
      min_margin_bottom_pt: "tokens.semantic.shapes.divider.margin_y_pt"
      placement: "Horizontal only; align to the 12-column content grid."

  data_viz:
    purpose: "Keep charts and tables readable in screen-delivered e-learning slides."
    chart:
      component: "tokens.component.chart_basic"
      allowed_types:
        - "bar"
        - "column"
        - "line"
        - "scatter"
        - "area"
      discouraged_types:
        pie: "Use only for 2-3 categories that total 100%; prefer bar charts for comparison."
        doughnut: "Avoid unless the total and category count are immediately obvious."
        "3d": "Prohibited because perspective distorts values and renders inconsistently."
      layout:
        safe_text_area_required: true
        min_height_pt: 240
        min_width_pt: 420
        max_charts_per_slide: 2
        require_title_or_slide_heading: true
        source_note_style: "rules.typography.text_styles.caption"
      color:
        series_palette: "tokens.semantic.color.data_series"
        max_series_without_review: 6
        max_series_absolute: 8
        use_palette_order: true
        single_series_color: "tokens.semantic.color.accent.magenta"
        comparison_baseline_color: "tokens.semantic.color.neutral.n500"
        prohibited:
          - "random_unmapped_series_colors"
          - "gradient_fills"
          - "pattern_fills_without_text_or_marker_label"
        meaning_not_color_only: "rules.accessibility.dont_use_color_only"
      axes:
        x_axis:
          visible: true
          label_type: "rules.typography.text_styles.caption"
          title_type: "rules.typography.text_styles.caption"
          label_color: "tokens.semantic.color.text.primary"
          title_color: "tokens.semantic.color.text.primary"
          line_width_pt: "tokens.semantic.data_viz.chart.axis_line_width_pt"
          line_color: "tokens.semantic.color.border.default"
          tick_width_pt: "tokens.semantic.data_viz.chart.tick_width_pt"
          tick_color: "tokens.semantic.color.border.default"
          label_rotation_allowed: false
        y_axis:
          visible: true
          label_type: "rules.typography.text_styles.caption"
          title_type: "rules.typography.text_styles.caption"
          label_color: "tokens.semantic.color.text.primary"
          title_color: "tokens.semantic.color.text.primary"
          line_width_pt: "tokens.semantic.data_viz.chart.axis_line_width_pt"
          line_color: "tokens.semantic.color.border.default"
          tick_width_pt: "tokens.semantic.data_viz.chart.tick_width_pt"
          tick_color: "tokens.semantic.color.border.default"
          start_at_zero_required_for:
            - "bar"
            - "column"
            - "area"
          truncated_axis_requires_annotation: true
        scale:
          max_major_ticks: 6
          min_major_ticks: 3
          avoid_dual_axis: true
      gridlines:
        major_y:
          allowed: true
          default_visible: true
          width_pt: "tokens.semantic.data_viz.chart.gridline_width_pt"
          color: "tokens.semantic.color.border.default"
        major_x:
          allowed: true
          default_visible: false
          width_pt: "tokens.semantic.data_viz.chart.gridline_width_pt"
          color: "tokens.semantic.color.border.default"
        minor:
          allowed: false
        opacity_note: "Use the neutral border token only; do not darken gridlines beyond text-muted contrast."
      labels:
        legend:
          allowed: true
          required_when_series_count_gt: 1
          type: "rules.typography.text_styles.caption"
          color: "tokens.semantic.color.text.primary"
          placement:
            - "top"
            - "right"
            - "bottom"
          avoid_when_direct_labels_fit: true
        data_labels:
          allowed: true
          type: "rules.typography.text_styles.caption"
          color: "tokens.semantic.color.text.primary"
          max_labels_without_review: 12
          position: "outside_end_or_near_point"
          avoid_overlap_required: true
        axis_labels:
          type: "rules.typography.text_styles.caption"
          min_size_pt: "rules.typography.minimum_pt.caption"
          max_lines: 2
      annotations:
        allowed: true
        type: "rules.typography.text_styles.caption"
        color: "tokens.semantic.color.text.primary"
        leader_line_width_pt: "tokens.semantic.data_viz.chart.annotation_leader_width_pt"
        leader_line_color: "tokens.semantic.color.border.default"
        max_per_chart: 3
        placement: "outside_plot_area_when_possible"
        required_for:
          - "truncated_axis"
          - "forecast_or_estimate"
          - "method_change"
          - "outlier_explanation"
        prohibited:
          - "decorative_callouts_without_data_meaning"
          - "annotation_covering_data_mark"
      number_format:
        max_decimals: "tokens.semantic.data_viz.number_format.max_decimals"
        percent_decimals: "tokens.semantic.data_viz.number_format.percent_decimals"
        thousands_separator: true
        negative_style: "minus"
        negative_example: "-1,234"
        unit_placement: "suffix_with_space"
        unit_examples:
          - "1,200 件"
          - "35%"
          - "2.4 pt"
        compact_large_numbers_allowed: true
        compact_large_numbers:
          threshold_abs_min: 10000
          japanese_units_allowed:
            - "万"
            - "億"
          english_units_allowed:
            - "K"
            - "M"
        missing_or_not_applicable: "-"
    table:
      component: "tokens.component.table_basic"
      use_for: "Exact values, sparse comparisons, and datasets where users must read individual cells."
      avoid_for: "Dense raw exports better suited to appendix or external files."
      text:
        header_type: "rules.typography.text_styles.caption"
        cell_type: "rules.typography.text_styles.caption"
        header_color: "tokens.semantic.color.text.primary"
        cell_color: "tokens.semantic.color.text.primary"
        min_size_pt: "rules.typography.minimum_pt.caption"
        max_lines_per_cell: 2
      sizing:
        header_row_height_pt: "tokens.semantic.data_viz.table.header_row_height_pt"
        row_height_pt: "tokens.semantic.data_viz.table.row_height_pt"
        cell_padding_x_pt: "tokens.semantic.data_viz.table.cell_padding_x_pt"
        cell_padding_y_pt: "tokens.semantic.data_viz.table.cell_padding_y_pt"
        max_rows_without_review: 8
        max_columns_without_review: 5
        fit_within_safe_text_area: true
      style:
        header_background: "tokens.semantic.color.background.muted"
        body_background: "tokens.semantic.color.background.base"
        zebra_rows_allowed: true
        zebra_row_background: "tokens.semantic.color.background.muted"
        gridline_width_pt: "tokens.semantic.data_viz.table.gridline_width_pt"
        gridline_color: "tokens.semantic.color.border.default"
        outer_border_required: false
        vertical_gridlines_allowed: true
        heavy_gridlines_prohibited: true
      alignment:
        text_columns: "left"
        numeric_columns: "right"
        header: "left"
        totals_row: "right_for_numbers_left_for_labels"
      number_format:
        source: "rules.data_viz.chart.number_format"
        align_decimals: true
        repeat_unit_in_header_when_column_shares_unit: true
      notes:
        source_note_required_when_external_data: true
        footnote_marker_style: "caption"

  animation:
    purpose: "Keep screen-delivered PPTX/PDF learning materials static, predictable, and readable without timing-dependent interaction."
    allowed: false
    final_distribution_policy: "Final PPTX/PDF must render all required slide content immediately on slide open."
    slide_transitions:
      allowed: false
      allowed_types:
        - "tokens.semantic.animation.transition.none"
      default_type: "tokens.semantic.animation.transition.none"
      duration_ms: "tokens.semantic.animation.duration_ms.none"
      sound_allowed: false
      auto_advance_allowed: false
      after_ms: "tokens.semantic.animation.delay_ms.none"
    object_animations:
      allowed: false
      object_animations_allowed: false
      allowed_effects: []
      duration_ms: "tokens.semantic.animation.duration_ms.none"
      delay_ms: "tokens.semantic.animation.delay_ms.none"
      repeat_allowed: false
      trigger_allowed: false
      motion_path_allowed: false
      emphasis_animation_allowed: false
    sequencing:
      build_order_allowed: false
      required_initial_visibility: "All instructional content needed to understand the slide must be visible before any user action."
      order_source_when_exception_reviewed: "rules.accessibility.reading_order"
      prohibited_orders:
        - "meaning_depends_on_click_sequence"
        - "content_hidden_until_auto_timer"
        - "decorative_reveal_before_heading"
    draft_exception_policy:
      allowed_before_final_only: true
      requires_manual_review: true
      allowed_effects:
        - "Appear"
        - "Fade"
      max_duration_ms: "tokens.semantic.animation.duration_ms.maximum"
      max_delay_ms: "tokens.semantic.animation.delay_ms.none"
      max_animated_objects_per_slide: 3
      required_order: "Follow the same logical order as rules.accessibility.reading_order."
      removal_required_before_final_distribution: true
    lint_target:
      transition_xml: "p:transition"
      timing_xml: "p:timing"
      check: "rules.lint.checks.animation_present"

  accessibility:
    purpose: "Make screen-delivered PPTX/PDF slides perceivable and understandable without relying on color, animation timing, or authoring-tool defaults."
    contrast_ratio_min:
      normal_text: 4.5
      large_text: 3.0
      non_text_graphics: 3.0
    contrast_scope:
      applies_to:
        - "text"
        - "icons"
        - "chart_marks"
        - "essential_lines"
        - "text_on_photo"
      measurement: "Use final rendered colors after fills, opacity, and photo overlays are applied."
      large_text_definition:
        min_size_pt: "rules.typography.size_scale_pt.heading"
        min_weight: "Bold"
      unknown_background_policy: "manual_review_required"
    contrast_pairs_allowed:
      source: "rules.color.allowlist.text_on_background"
      require_pair_role: true
      custom_pair_policy: "Allowed only when measured contrast_ratio meets rules.accessibility.contrast_ratio_min.normal_text or large_text as applicable."
      minimum_fields:
        - "role"
        - "text_hex"
        - "background_hex"
        - "contrast_ratio"
    contrast_pairs_prohibited:
      source: "rules.color.allowlist.prohibited.text_on_background"

    dont_use_color_only:
      enabled: true
      severity: "warning"
      applies_to:
        - "state"
        - "correctness"
        - "priority"
        - "series_identity"
        - "trend_direction"
      required_secondary_cues:
        state:
          - "text_label"
          - "icon_or_shape"
        correct_wrong:
          - "text_label"
          - "symbol"
        chart_series:
          - "direct_label_or_legend"
          - "marker_shape_or_line_style_when_series_count_gt_1"
        trend:
          - "arrow_or_text_delta"
          - "numeric_label"
      prohibited:
        - "legend_or_status_explained_by_color_name_only"
        - "red_green_difference_without_text_or_symbol"
        - "chart_series_distinguished_only_by_hue"
      check_method: "Review semantic roles and visible text/symbol labels; color differences alone must not be the only encoded meaning."

    alt_text:
      required: true
      required_for:
        - "photos"
        - "screenshots"
        - "charts_as_images"
        - "icons_with_meaning"
        - "diagrams"
        - "logos"
      decorative_allowed: true
      decorative_value: "decorative"
      decorative_requires_no_instructional_meaning: true
      omitted_for:
        - "purely_decorative_background_shapes"
        - "repeated_progress_indicators_already_explained_by_text"
      content_rules:
        max_chars: 140
        must_describe_function_not_visual_style: true
        include_key_data_for_chart_images: true
        include_action_context_for_screenshots: true
        avoid_phrases:
          - "image of"
          - "picture of"
      storage:
        source_field: "PowerPoint object alt text title or description"
        decorative_marker: "PowerPoint alt text description exactly 'decorative'"
        speaker_notes_fallback_allowed: false
      check_method: "Every meaningful image-like object has non-empty alt text; decorative objects use the configured decorative marker."

    reading_order:
      required: true
      mode: "PowerPoint_selection_pane_order"
      order: "top_to_bottom_left_to_right_with_template_slots"
      source_of_truth:
        primary: "PowerPoint Selection Pane order"
        secondary: "layout_templates.templates.<template_id>.slots"
      slot_priority:
        title:
          - "title"
          - "subtitle"
          - "footer"
        section_divider:
          - "section_label"
          - "heading"
          - "supporting_text"
        one_message:
          - "heading"
          - "body"
          - "footer_progress"
        two_column:
          - "heading"
          - "left_panel"
          - "right_panel"
        diagram:
          - "heading"
          - "body"
          - "media"
          - "caption"
        table:
          - "heading"
          - "table"
          - "note"
        caution:
          - "heading"
          - "caution"
          - "supporting_text"
        step_list:
          - "heading"
          - "steps"
        quiz:
          - "question"
          - "choices"
          - "explanation"
        summary:
          - "heading"
          - "takeaways"
          - "next_action"
      grouped_objects_policy: "Group only when the grouped objects form one logical unit; otherwise ungroup before final review."
      hidden_or_decorative_policy: "Decorative-only objects should not interrupt the reading order."
      check_method: "Compare selection-pane sequence with the applicable template slot priority and visible logical reading sequence."

    flashing_prohibited: true
    media_and_motion:
      flashing_threshold_hz_max: 3
      animation_dependency_prohibited: true
      source: "rules.animation"
    lint_targets:
      contrast_ratio:
        severity: "warning"
        source: "rules.accessibility.contrast_pairs_allowed"
      color_only_meaning:
        severity: "warning"
        source: "rules.accessibility.dont_use_color_only"
      alt_text_required:
        severity: "warning"
        source: "rules.accessibility.alt_text"
      reading_order:
        severity: "warning"
        source: "rules.accessibility.reading_order"

  lint:
    mode: "review"
    report_only: true

    # PRI-001: Pn と未実装候補を lint 実装から独立して参照するため追加。
    priorities:
      basis: "Pn は finding 数ではなく、納品物への影響度で決める。"
      axes:
        readability: "画面表示で文字、図表、画像の内容を読めるか。"
        comprehension: "構造、順序、折返し、欠落が理解や意味を阻害しないか。"
        delivery_quality: "PPTX/PDF の静的配布で必要情報が失われず、提出物として破綻しないか。"
        brand_template_divergence: "SHIFT AI テンプレート、色、余白、書体からの逸脱が許容範囲か。"
        micro_fix_impact: "1pt 丸めなど微修正で済み、内容理解への影響が小さいか。"
      levels:
        P0:
          definition: "読めない、見えない、欠落、文字化けなど、内容の成立を壊す。"
          required_action: "納品前に必ず直す。"
        P1:
          definition: "可読性、理解、静的配布、アクセシビリティに直接リスクがある。"
          required_action: "納品前に修正または明示的に許容判断する。"
        P2:
          definition: "ブランド、テンプレート、余白、書体などの逸脱で、品質判断が必要。"
          required_action: "意図した表現なら許容し、そうでなければスタイルへ寄せる。"
        P3:
          definition: "座標丸めなど、見た目や理解への影響が小さい微修正。"
          required_action: "テンプレート整備や一括補正時に処理する。"
      unimplemented_can_be_p0_to_p2:
        - id: "missing_required_element"
          label: "欠落"
        - id: "wrap_break_changes_meaning"
          label: "意味が変わる折返し"
        - id: "key_area_cropped"
          label: "画像重要部の切れ"
        - id: "heading_hierarchy_broken"
          label: "階層崩れ"

    # LINT-007: Finding.detail を修正判断に使える evidence として揃える。
    finding_evidence_schema:
      version: "0.1.0-draft"
      applies_to: "pptx_lint.py Finding JSON output"
      intent: >
        Every finding must carry enough evidence to explain why it was
        detected, whether it can be auto-fixed, and which guideline-conformant
        values are plausible repair candidates.
      output_shape:
        required_top_level_fields:
          - "check"
          - "severity"
          - "priority"
          - "review_status"
          - "slide_index"
          - "slide_id"
          - "shape_id"
          - "shape_name"
          - "shape_kind"
          - "message"
        required_evidence_fields:
          - "target"
          - "measurement"
          - "evidence_source"
          - "evidence_confidence"
          - "fixability"
          - "candidate_values"
          - "group_key"
          - "artifact_refs"
        transitional_mapping: >
          Existing Finding fields may remain top-level during migration, but
          any value needed by auto-fix, review prioritization, or visual review
          must also be available through this evidence schema.
      enums:
        review_status:
          - "unreviewed"
          - "fix_required"
          - "accepted"
          - "false_positive"
          - "fixed"
          - "out_of_scope"
        judgement_reason:
          accepted:
            - "intentional_template_design"
            - "within_visual_tolerance"
            - "decorative_only"
            - "brand_approved_exception"
          fix_required:
            - "auto_fixable"
            - "manual_layout_fix"
            - "manual_content_fix"
            - "master_template_fix"
            - "requires_design_decision"
          fixed:
            - "fixed_in_later_artifact"
            - "fixed_by_rule_update"
          false_positive:
            - "lint_rule_too_strict"
            - "measurement_error"
            - "missing_context"
          out_of_scope:
            - "master_owns"
            - "different_distribution"
            - "legacy_asset_frozen"
            - "partner_owned"
        evidence_source:
          - "pptx_xml"
          - "rendered_image"
          - "structure_json"
          - "manual_review"
        evidence_confidence:
          - "high"
          - "medium"
          - "low"
        fixability:
          - "auto_fix_candidate"
          - "manual_required"
          - "not_applicable"
          - "decorative_review"
      field_definitions:
        priority: "Pn value resolved from rules.lint.priority_catalog.<check>.priority."
        review_status: "Review lifecycle state; automated lint starts as unreviewed."
        judgement_reason: "Subtype of the review_status decision, drawn from enums.judgement_reason.<review_status>. Required when review_status is not unreviewed."
        target: "Object describing the affected slide, shape, text run, table cell, or relation."
        target.text_excerpt: "Short plain-text excerpt when the affected target is text."
        target.bbox_pt: "Normalized [x, y, w, h] in guideline pt coordinates."
        target.actual_bbox_pt: "Source PPTX [x, y, w, h] in actual slide pt coordinates."
        target.rendered_bbox_px: "Rendered image [x, y, w, h] in pixel coordinates when image evidence exists."
        measurement.measured_value: "Primary measured value that triggered the finding."
        measurement.threshold: "Guideline limit, allowed set, or comparison target."
        measurement.delta: "Signed or absolute difference from threshold when meaningful."
        measurement.unit: "Unit such as pt, px, ratio, hex, enum, bool, or count."
        measurement.supporting_values: "Check-specific raw values needed to recompute or verify the finding."
        evidence_source: "Primary source used to produce measurement."
        evidence_confidence: "Confidence in the measurement source and inference."
        fixability: "Whether an automated fix may be attempted from JSON evidence alone."
        manual_required_reason: "Required when fixability is manual_required or decorative_review."
        candidate_values: "List of guideline-compliant alternatives with token/value/proof fields."
        recommended_value: "Single preferred candidate when the tool can justify one."
        group_key: "Stable key for bundling same-cause findings across slides."
        artifact_refs: "Local generated artifact paths; keep tmp/review and generated PPTX out of git."
      candidate_value_fields:
        - "kind"
        - "token_ref"
        - "value"
        - "predicted_measurement"
        - "passes_threshold"
        - "reason"
      common_requirements:
        automated_findings:
          priority: "required"
          review_status: "unreviewed"
          evidence_source: "pptx_xml, rendered_image, or structure_json"
          evidence_confidence: "high unless the check uses heuristic image or background inference"
          group_key: "check plus stable bbox/relation/value signature"
          artifact_refs: "empty list unless generated evidence exists"
        manual_review_findings:
          evidence_source: "manual_review"
          evidence_confidence: "low until reviewer records the basis"
          fixability: "manual_required"
          manual_required_reason: "required"
        auto_fix_candidate_findings:
          candidate_values: "non-empty"
          recommended_value: "required"
          validation: "candidate must include predicted_measurement or before/after value proving it satisfies threshold"
      check_specific_required_evidence:
        slide_size:
          evidence_source: "pptx_xml"
          evidence_confidence: "high"
          fixability: "manual_required"
          required_target_fields:
            - "slide_index"
          required_measurement_fields:
            - "actual_pt"
            - "base_pt"
            - "scale"
            - "measured_value"
            - "threshold"
            - "unit"
          manual_required_reason: "Canvas conversion can change layout and must be reviewed."
        overflow_text:
          evidence_source: "pptx_xml"
          evidence_confidence: "high"
          fixability: "manual_required"
          required_target_fields:
            - "bbox_pt"
            - "actual_bbox_pt"
            - "text_excerpt"
          required_measurement_fields:
            - "overflow_by_pt"
            - "slide_canvas_pt"
            - "measured_value"
            - "threshold"
            - "unit"
          manual_required_reason: "Repair may require content, line break, font, or box-size decisions."
        overflow_shapes:
          evidence_source: "pptx_xml"
          evidence_confidence: "high"
          fixability: "manual_required"
          required_target_fields:
            - "bbox_pt"
            - "actual_bbox_pt"
          required_measurement_fields:
            - "overflow_by_pt"
