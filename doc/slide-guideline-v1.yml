# -----------------------------------------------------------------------------
# Rules (enforcement targets)
# -----------------------------------------------------------------------------
rules:
  slide:
    aspect: "16:9"
    size_pt:
      w: 1440
      h: 810
      role: "base_coordinate_system"
    size_policy:
      allow_proportional_16_9: true
      lint_normalization: >
        1440x810pt is the base coordinate system, not the only accepted PPTX
        canvas size. For proportional 16:9 decks, lint scales coordinates,
        typography sizes, line heights, and image display dimensions to the
        base coordinate system before applying thresholds.

    safe_margins_pt_min:
      left: 81
      right: 81
      top: 40
      bottom: 80

    safe_text_area_pt:
      x: 81
      y: 40
      w: 1278
      h: 690

    layout_grid:
      columns: 12
      gutter_pt: 18
      column_width_pt: 90
      baseline_grid_pt: 6

    object_spacing:
      default_adjacent_gap_pt_min: 0
      element_marker: "ds:element"
      element_gap_pt_min:
        default: 0
        peer_object: "tokens.semantic.layout.adjacent_object_gap_pt_min"
      semantic_pair_gap_pt_min:
        title_subtitle: 8.0
        label_group: 16.0
      semantic_pair_detection:
        title_subtitle:
          axis: "vertical"
          upper_font_size_pt_min: 28.0
          lower_font_size_pt_max: 24.0
          x_align_tolerance_pt: 24.0
          condition: "Two stacked text shapes with similar left-x where the upper shape has a title-scale font and the lower shape has a smaller subtitle-scale font."
        label_group:
          axis: "horizontal"
          font_size_diff_pt_max: 1.5
          y_align_tolerance_pt: 8.0
          condition: "Two text shapes in the same row (vertical centers within tolerance) sharing nearly identical font sizes."
      applies_when: "Two normalized object bounding boxes are adjacent on one axis and overlap on the opposite axis."
      rule_application: "Take the maximum of element_gap_pt_min (from ds:element) and semantic_pair_gap_pt_min (from inferred title_subtitle / label_group pair) for the threshold. Missing or unknown elements default to 0 and do not emit object_gap_too_small unless a semantic pair is detected."
      excludes:
        - "intentional_grouping"
        - "intentional_overlap_or_layering"
        - "container_child_relationship"
        - "decorative_template_element"

    layout_templates:
      registry: "layout_templates.templates"
      minimum_template_ids: "layout_templates.minimum_template_ids"
      margin_scale_pt: "layout_templates.margin_scale_pt"
      slot_defaults: "layout_templates.slot_defaults"
      required_grid:
        columns: "rules.slide.layout_grid.columns"
        gutter_pt: "rules.slide.layout_grid.gutter_pt"
        column_width_pt: "rules.slide.layout_grid.column_width_pt"
        baseline_grid_pt: "rules.slide.layout_grid.baseline_grid_pt"
      slot_requirements:
        horizontal_grid: "Slots must define col_start and col_span on the 12-column grid."
        vertical_grid: "Text and shape slots should place y_pt and h_pt on the baseline grid."
        safe_text_area: "Text slots must remain within rules.slide.safe_text_area_pt unless an explicit scope exception applies."

    defaults:
      text_align: "Left"
      text_vertical_align: "Top"
      text_autofit: "None"

    overflow:
      # Hard rule: elements must not go outside the slide canvas.
      text_right_margin_pt_min: 0
      text_left_margin_pt_min: 0
      text_top_margin_pt_min: 0
      text_bottom_margin_pt_min: 0
      shape_right_margin_pt_min: 0
      shape_left_margin_pt_min: 0
      shape_top_margin_pt_min: 0
      shape_bottom_margin_pt_min: 0
      image_right_margin_pt_min: 0
      image_left_margin_pt_min: 0
      image_top_margin_pt_min: 0
      image_bottom_margin_pt_min: 0

    safe_area_enforcement:
      text_within_safe_text_area:
        enabled: true
        severity: "warning"
      non_text_within_safe_margins:
        enabled: true
        severity: "warning"

    geometry_rounding:
      geometry_snap_pt: 0.5
      recommend_integer_pt: true
      normalize_geometry_to_integer_pt: true
      normalize_strategy:
        x_round_to_pt: 1
        y_round_to_pt: 1
        w_round_to_pt: 1
        h_round_to_pt: 1
      baseline_alignment:
        enabled: true
        target_grid_pt: 6
        severity: "warning"
        applies_to:
          - "text_boxes"
          - "shapes"

  typography:
    fonts:
      primary:
        family: "Noto Sans JP"
        weights:
          - "Medium"
          - "Bold"
      latin:
        family: "Avenir Next Arabic"
      fallback:
        family: "Nunito Sans"

    size_scale_pt:
      title: 80
      large_title: 64
      section_title: 56
      cover_title: 48
      large_heading: 40
      heading: 36
      subheading: 32
      small_heading: 28
      body: 24
      small_body: 22
      caption: 20
    size_tolerance_pt: 1

    line_height_pt:
      title: 90
      section_title: 66
      heading: 42
      subheading: 36
      body: 30
      caption: 24
    line_height_tolerance_pt: 2

    minimum_pt:
      body: 24
      caption: 20

    text_styles:
      title:
        type: "tokens.semantic.type.title"
        family: "tokens.value.typography.font_family_primary"
        weight: "Bold"
        line_height: "rules.typography.line_height_pt.title"
        paragraph_spacing_before_pt: 0
        paragraph_spacing_after_pt: 0
        max_lines: 2
      section_title:
        type: "tokens.semantic.type.section_title"
        family: "tokens.value.typography.font_family_primary"
        weight: "Bold"
        line_height: "rules.typography.line_height_pt.section_title"
        paragraph_spacing_before_pt: 0
        paragraph_spacing_after_pt: 0
        max_lines: 2
      heading:
        type: "tokens.semantic.type.heading"
        family: "tokens.value.typography.font_family_primary"
        weight: "Bold"
        line_height: "rules.typography.line_height_pt.heading"
        paragraph_spacing_before_pt: 0
        paragraph_spacing_after_pt: "rules.typography.paragraph_spacing_pt.after_heading"
        max_lines: 3
      subheading:
        type: "tokens.semantic.type.subheading"
        family: "tokens.value.typography.font_family_primary"
        weight: "Bold"
        line_height: "rules.typography.line_height_pt.subheading"
        paragraph_spacing_before_pt: 0
        paragraph_spacing_after_pt: "rules.typography.paragraph_spacing_pt.after_heading"
        max_lines: 3
      body:
        type: "tokens.semantic.type.body"
        family: "tokens.value.typography.font_family_primary"
        weight: "Medium"
        line_height: "rules.typography.line_height_pt.body"
        paragraph_spacing_before_pt: 0
        paragraph_spacing_after_pt: "rules.typography.paragraph_spacing_pt.after_body"
        max_lines: 6
      caption:
        type: "tokens.semantic.type.caption"
        family: "tokens.value.typography.font_family_primary"
        weight: "Medium"
        line_height: "rules.typography.line_height_pt.caption"
        paragraph_spacing_before_pt: 0
        paragraph_spacing_after_pt: 0
        max_lines: 2

    text_box_margins_pt:
      left: 6
      right: 6
      top: 6
      bottom: 6

    text_autofit:
      allowed: false
      allowed_modes: []

    alignment:
      default_horizontal: "Left"
      default_vertical: "Top"
      allowed_horizontal:
        - "Left"
        - "Center"
      allowed_vertical:
        - "Top"
        - "Middle"

    paragraph_spacing_pt:
      after_heading: 12
      after_body: 6

    paragraph:
      line_height:
        unit: "pt"
        mode: "fixed"
        source: "tokens.semantic.type.<style>.line_height_pt"
        tolerance_pt: "rules.typography.line_height_tolerance_pt"
        allow_auto_line_spacing: false
      spacing:
        unit: "pt"
        before_default_pt: 0
        after_default_pt: "rules.typography.paragraph_spacing_pt.after_body"
        after_heading_pt: "rules.typography.paragraph_spacing_pt.after_heading"
        after_body_pt: "rules.typography.paragraph_spacing_pt.after_body"
        consecutive_same_style_collapse: false
      block_limits:
        body_max_lines: "rules.typography.readability.recommended_max_lines_per_block_body"
        body_max_chars_per_line: "rules.typography.readability.recommended_max_chars_per_line_body"

    lists:
      bullet:
        indent_pt: 36
        hanging_pt: 12
        level2_indent_pt: 54
        level2_hanging_pt: 12
        marker: "bullet"
        text_style: "rules.typography.text_styles.body"
        paragraph_spacing_before_pt: 0
        paragraph_spacing_after_pt: "rules.typography.paragraph_spacing_pt.after_body"
        line_height: "rules.typography.line_height_pt.body"
        level_rules:
          level_1:
            indent_pt: 36
            hanging_pt: 12
            text_style: "rules.typography.text_styles.body"
          level_2:
            indent_pt: 54
            hanging_pt: 12
            text_style: "rules.typography.text_styles.caption"
      max_levels: 2
      max_items_per_slide: "rules.typography.readability.recommended_max_bullets_per_slide"
      require_parallel_structure: true

    emphasis:
      allowed:
        bold: true
        accent_color: true
        underline: false
        italic: false
        all_caps: false
      bold:
        weight: "Bold"
        allowed_styles:
          - "heading"
          - "subheading"
          - "body"
          - "caption"
      accent_color:
        color: "tokens.semantic.color.accent.magenta"
        max_runs_per_text_box: 2
        max_chars_per_run: 18
      combined_emphasis:
        max_methods_per_run: 1
        allowed_combinations: []

    fallback_tolerance:
      fallback_family: "tokens.value.typography.font_family_fallback"
      allowed_when_primary_missing: true
      size_delta_pt_max: 0
      line_height_delta_pt_max: 2
      paragraph_spacing_delta_pt_max: 0
      text_box_overflow_tolerance_pt: 4
      width_reflow_tolerance_ratio_max: 0.05
      require_manual_review_on_overflow: true

    readability:
      recommended_max_chars_per_line_body: 26
      recommended_max_lines_per_block_body: 6
      recommended_max_bullets_per_slide: 6

  color:
    model:
      principle: "Allowed color hex values are not interchangeable. Raw palette values, semantic roles, usage policies, pair policies, and repair policies must stay separate."
      layers:
        raw_palette: "rules.color.palette and tokens.value.color.* store color values and scale families only."
        semantic_roles: "tokens.semantic.color.* assigns usage meaning such as text.primary, background.base, accent.magenta, state.info, and data_series."
        usage_policy: "rules.color.allowlist defines where semantic roles may be used."
        pair_policy: "rules.color.allowlist.text_on_background defines approved text/background combinations."
        repair_policy: "rules.color.repair_candidates defines what automated fixes may choose for each repair context."
      prohibited_flattening:
        - "Do not mix accent, state, data_series, fill, and body-text roles into one generic text repair candidate list."
        - "Do not use unrelated neutral/accent/state colors for contrast repair when a same-family palette color can pass contrast."
        - "Do not choose contrast repair colors only by nearest RGB distance across all allowed colors."

    palette:
      background:
        base: "#FFFFFF"
        muted: "#F7F7F7"
      neutral:
        n0: "#FFFFFF"
        n100: "#F7F7F7"
        n200: "#EEEEEE"
        n300: "#DDDDDD"
        n500: "#999999"
        n600: "#666666"
        n700: "#333333"
        n900: "#111111"
      text:
        primary: "#333333"
        alt_dark: "#1E112D"
        inverse: "#FFFFFF"
        muted: "#666666"
      border:
        default: "#DDDDDD"
      accent:
        magenta: "#A51E6D"
      brand:
        usage_policy:
          primary_and_black_default: true
          secondary_allowed_when_needed: true
          source: "/Users/yamadakenichi/Downloads/design_guideline.pptx"
        primary:
          p900: "#A51E6D"
          p800: "#AE357C"
          p700: "#B74B8A"
          p600: "#C06299"
          p500: "#C978A7"
          p400: "#D28FB6"
          p300: "#DBA5C5"
          p200: "#E4BCD3"
          p100: "#EDD2E2"
          p50: "#F6E9F0"
        black:
          b900: "#333333"
          b800: "#474747"
          b700: "#5C5C5C"
          b600: "#707070"
          b500: "#858585"
          b400: "#999999"
          b300: "#ADADAD"
          b200: "#C2C2C2"
          b100: "#D6D6D6"
          b50: "#EBEBEB"
        secondary:
          s900: "#039578"
          s800: "#1CA086"
          s700: "#35AA93"
          s600: "#4FB5A1"
          s500: "#68BFAE"
          s400: "#81CABC"
          s300: "#9AD5C9"
          s200: "#B3DFD7"
          s100: "#CDEAE4"
          s50: "#E6F4F2"
        gradient:
          red: "#FF5757"
          red_deep: "#E6033D"
          cyan: "#32BED2"
          purple: "#8C52FF"
          purple_deep: "#673BA0"
        gold:
          base: "#FFBC2A"
          light: "#FFE177"
          pale: "#FFF9CF"
        utility:
          black: "#000000"
          off_white: "#FEFEFE"
      state:
        success: "#009E73"
        warning: "#E69F00"
        danger: "#D55E00"
        info: "#0072B2"
      data_series:
        series_1: "#A51E6D"
        series_2: "#1E112D"
        series_3: "#0072B2"
        series_4: "#009E73"
        series_5: "#E69F00"
        series_6: "#D55E00"
        series_7: "#56B4E9"
        series_8: "#CC79A7"

    allowlist:
      mode: "recommended"
      backgrounds:
        page:
          - role: "base"
            color: "tokens.semantic.color.background.base"
            hex: "#FFFFFF"
          - role: "muted"
            color: "tokens.semantic.color.background.muted"
            hex: "#F7F7F7"
        surface:
          - role: "neutral_0"
            color: "tokens.semantic.color.neutral.n0"
            hex: "#FFFFFF"
          - role: "neutral_100"
            color: "tokens.semantic.color.neutral.n100"
            hex: "#F7F7F7"
          - role: "neutral_200"
            color: "tokens.semantic.color.neutral.n200"
            hex: "#EEEEEE"
      grays:
        text:
          - role: "primary"
            color: "tokens.semantic.color.text.primary"
            hex: "#333333"
          - role: "muted"
            color: "tokens.semantic.color.text.muted"
            hex: "#666666"
          - role: "alt_dark"
            color: "tokens.semantic.color.text.alt_dark"
            hex: "#1E112D"
        border:
          - role: "default"
            color: "tokens.semantic.color.border.default"
            hex: "#DDDDDD"
        fill:
          - role: "neutral_0"
            color: "tokens.semantic.color.neutral.n0"
            hex: "#FFFFFF"
          - role: "neutral_100"
            color: "tokens.semantic.color.neutral.n100"
            hex: "#F7F7F7"
          - role: "neutral_200"
            color: "tokens.semantic.color.neutral.n200"
            hex: "#EEEEEE"
          - role: "neutral_300"
            color: "tokens.semantic.color.neutral.n300"
            hex: "#DDDDDD"
      accents:
        primary:
          role: "magenta"
          color: "tokens.semantic.color.accent.magenta"
          hex: "#A51E6D"
          allowed_uses:
            - "section_marker"
            - "callout_border"
            - "emphasis_text"
            - "small_fill"
        primary_tints:
          role: "magenta_tints"
          colors: "tokens.semantic.color.brand.primary"
          allowed_uses:
            - "table_header"
            - "zebra_row_background"
            - "callout_background"
            - "subtle_section_background"
        secondary:
          role: "secondary_green"
          colors: "tokens.semantic.color.brand.secondary"
          allowed_uses:
            - "secondary_marker"
            - "supporting_diagram"
            - "secondary_table_highlight"
        special:
          gradient_colors: "tokens.semantic.color.brand.gradient"
          gold_colors: "tokens.semantic.color.brand.gold"
          utility_colors: "tokens.semantic.color.brand.utility"
          allowed_uses:
            - "design_guideline_defined_gradient"
            - "gold_badge_or_marker"
            - "design_guideline_annotation_text"
      state_colors:
        success:
          color: "tokens.semantic.color.state.success"
          hex: "#009E73"
          allowed_uses:
            - "status_icon"
            - "status_border"
            - "small_marker"
        warning:
          color: "tokens.semantic.color.state.warning"
          hex: "#E69F00"
          allowed_uses:
            - "status_icon"
            - "status_border"
            - "small_marker"
        danger:
