meta:
  version: "0.1.0-draft"
  generated_at_utc: "2026-04-26"
  based_on:
    - "doc/slide-guideline-v0.yml"
    - "doc/design-system-review-v0.md"
  sources:
    - pptx: "slide-guideline/【e-learning】guideline.pptx"
      rules_yaml: "slide-guideline/yaml/【e-learning】guideline.rules.yaml"
    - pptx: "tmp/canva-export-DAG_P9bfpug-1769251822309.pptx"
      rules_yaml: "slide-guideline/yaml/canva-export-DAG_P9bfpug-1769251822309.rules.yaml"
      role: "historical_reference_only"
  status: "scope_locked"
  priorities:
    - "readability_for_learning"
    - "brand_expression"
    - "production_speed"
  notes: >
    This draft locks delivery to screen-only and disables text auto-fit.
    PowerPoint is the only in-scope authoring tool. Canva export remains a
    historical reference source, not an editing or compatibility target.
    LMS is considered only as a final PPTX/PDF display context; upload,
    SCORM, quiz integration, and video conversion are out of scope.
  scope_decision_notes:
    - >
      PowerPoint is the source of truth because the review and repair tooling
      operates on editable PPTX packages and uses PowerPoint-compatible slide
      geometry, text frames, relationships, and rendering assumptions.
    - >
      Canva appears only because one historical export was used while deriving
      observed token values. That file can explain where a value came from, but
      it must not create Canva editing, template, export, or compatibility
      requirements for this guideline.
    - >
      LMS is relevant only as the place where the final PPTX/PDF may be viewed.
      The guideline should therefore protect readability inside a typical
      embedded document viewer, but it should not cover LMS upload workflows,
      SCORM packaging, quiz integration, tracking, or video conversion.
    - >
      PDF is in scope as a static delivery/export format for checking rendered
      output. PDF editing and print-specific optimization are outside the
      current scope.
    - >
      Mobile-first viewing is outside the current scope because the slide
      system is defined for 16:9 screen delivery. Mobile viewing may be used as
      a secondary smoke check, not as a layout driver.

# -----------------------------------------------------------------------------
# Scope (locked)
# -----------------------------------------------------------------------------
scope:
  scope_owner: "PPTX design review tooling"
  decision_date: "2026-04-26"
  decision_basis:
    - "Editable source deck is PPTX"
    - "Automated lint/fix/repair tools operate on PPTX package structure"
    - "Primary review target is screen-readable e-learning slide delivery"
  authoring_tools_priority:
    - "PowerPoint"
  delivery_formats_priority:
    - "PPTX"
    - "PDF"
  viewing_environments_priority:
    - "PC fullscreen"
    - "Projector"
    - "LMS embedded viewer (PPTX/PDF display only)"
  screen_only: true
  final_distribution_contexts:
    - "LMS-hosted PPTX/PDF"
  out_of_scope:
    - "Canva editing"
    - "Canva template compatibility"
    - "Canva export validation"
    - "LMS upload/integration"
    - "SCORM packaging"
    - "LMS quiz integration"
    - "video conversion"
    - "print optimization"
    - "mobile-first viewing"
  non_goals:
    canva: >
      Do not test, repair, or optimize Canva-authored templates. Historical
      Canva-derived values may remain in sources only as provenance.
    lms: >
      Do not implement LMS APIs, upload flows, SCORM manifests, completion
      tracking, quiz mapping, or player-specific behavior.
    video: >
      Do not define narration, subtitles, timing tracks, video safe areas, or
      export pipelines in the current draft.
    print: >
      Do not optimize for printed handouts, printer margins, grayscale output,
      or paper sizes in the current draft.

  exceptions:
    full_bleed_background:
      allowed: true
      constraint: "Text must stay within rules.slide.safe_text_area_pt."
    full_bleed_photo:
      allowed: true
      constraint: "Text must stay within rules.slide.safe_text_area_pt. If text overlays photo, follow rules.imagery.text_on_photo."
    dense_table:
      allowed: true
      constraint: "Only for unavoidable content. Use rules.data_viz.table. Cell text may use caption size_pt."
    screenshot:
      allowed: true
      constraint: "Screenshots may be edge-to-edge. Any labels and captions must stay within rules.slide.safe_text_area_pt."
    legal_footer:
      allowed: true
      constraint: "Only for required notices. Use caption style and keep within rules.slide.safe_text_area_pt."

# -----------------------------------------------------------------------------
# Distribution artifacts
# -----------------------------------------------------------------------------
distribution:
  purpose: "Define the canonical PowerPoint master, derivative artifacts, asset storage, naming rules, and export settings for screen-delivered PPTX/PDF materials."
  source_of_truth:
    authoring_tool: "PowerPoint"
    canonical_master:
      role: "editable_slide_master"
      path: "design-system/master/e-learning-master.pptx"
      format: "pptx"
      git_policy: "Track only when explicitly approved; generated PPTX artifacts stay out of git by default."
    guideline_yaml:
      path: "doc/slide-guideline-v1.yml"
      role: "machine_readable_rules"
    task_ledger:
      path: "doc/tasks.md"
      role: "local_task_status"

  asset_storage:
    root: "design-system/assets"
    folders:
      photos: "design-system/assets/photos"
      screenshots: "design-system/assets/screenshots"
      icons: "design-system/assets/icons"
      logos: "design-system/assets/logos"
      data_sources: "design-system/assets/data-sources"
      exported_media: "tmp/exports/media"
    source_tracking:
      required_for_external_assets: true
      metadata_file: "design-system/assets/asset-register.yml"
      fields:
        - "asset_id"
        - "file_name"
        - "owner_or_provider"
        - "license_or_usage_basis"
        - "created_or_retrieved_date"
        - "allowed_use"
    git_policy:
      source_assets: "May be tracked when license permits and size is reasonable."
      generated_exports: "Keep under tmp/ or another ignored location unless explicitly requested."

  derivative_artifacts:
    pptx_delivery:
      role: "editable_delivery_copy"
      path_pattern: "tmp/distribution/{deck_id}/{deck_id}.pptx"
      generated: true
      git_policy: "ignored"
    pdf_delivery:
      role: "static_delivery_copy"
      path_pattern: "tmp/distribution/{deck_id}/{deck_id}.pdf"
      generated: true
      git_policy: "ignored"
    review_images:
      role: "visual_review_output"
      path_pattern: "tmp/review/{deck_id}/slide-{slide_no:03}.png"
      generated: true
      git_policy: "ignored"
    lint_report:
      role: "machine_review_output"
      path_pattern: "tmp/review/{deck_id}/lint.json"
      generated: true
      git_policy: "ignored"
    examples:
      role: "tool_generated_lint_fixtures"
      path_pattern: "skills/pptx-design-reviewer/examples/{case}.pptx"
      generated: true
      git_policy: "ignored"

  naming:
    deck_id:
      case: "lower-kebab-case"
      allowed_chars: "a-z, 0-9, hyphen"
      pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
      examples:
        - "risk-management-course"
        - "compliance-basics"
    master_file:
      pattern: "{system_id}-master.pptx"
      example: "e-learning-master.pptx"
    delivery_files:
      pptx: "{deck_id}.pptx"
      pdf: "{deck_id}.pdf"
      lint_json: "lint.json"
      review_image: "slide-{slide_no:03}.png"
    version_suffix:
      optional: true
      pattern: "{deck_id}.v{major}.{minor}.{patch}.{ext}"
      use_when: "External review requires immutable handoff naming."

  export_settings:
    location: "distribution.export_settings"
    pptx:
      slide_size: "rules.slide.size_pt"
      format: "pptx"
      include_hidden_slides: false
      require_lint_before_export: true
      require_animation_removed: true
    pdf:
      format: "pdf"
      intent: "screen_viewing"
      include_speaker_notes: false
      include_hidden_slides: false
      preserve_hyperlinks: true
      require_visual_review_after_export: true
      print_optimization: false
    review_images:
      format: "png"
      dpi_min: 144
      background: "opaque"
      naming: "distribution.naming.delivery_files.review_image"
      purpose: "Before/after visual inspection and design review."

  release_gate:
    required_checks:
      - "YAML parse succeeds for doc/slide-guideline-v1.yml"
      - "Markdown lint passes for task and agent docs"
      - "PPTX lint has no errors on the delivery PPTX"
      - "PDF visual review confirms readable rendering"
    generated_artifact_policy: "Do not commit generated PPTX, PDF, review images, or lint reports unless the user explicitly asks."

# -----------------------------------------------------------------------------
# Tokens
# - value: raw values only
# - semantic: meaning-based aliases that resolve to value tokens
# - component: reusable component-level defaults that resolve to semantic/value tokens
# -----------------------------------------------------------------------------
tokens:
  naming:
    value: "tokens.value.<category>.<name>"
    semantic: "tokens.semantic.<domain>.<role>"
    component: "tokens.component.<component>.<property>"
    reference_syntax: "Use a dot-path string such as tokens.value.color.text_primary."
    name_case: "lower_snake_case"
    unit_suffix_policy:
      measured_values: "Use _pt, _px, or _ratio_0_1 on leaf names where the unit is not already implied by the category."
      colors: "Color leaf values are hex strings under color categories; use _hex only when the category does not make the unit clear."

  unit:
    layout: "pt"
    imagery: "px"
    color: "hex"
    opacity: "ratio_0_1"

  unit_rules:
    pt: "Use for PowerPoint slide geometry, spacing, typography, radius, stroke width, and line height."
    px: "Use only for source bitmap dimensions and raster export requirements."
    hex: "Use uppercase #RRGGBB strings for colors."
    ratio_0_1: "Use a decimal number from 0.0 to 1.0 for opacity, scale, and area ratios."

  reference_policy:
    value_tokens: "Raw values only. Do not reference semantic or component tokens from tokens.value."
    semantic_tokens: "Must map to tokens.value.* leaf paths. Semantic tokens express usage or meaning, not new raw values."
    component_tokens: "Must map to tokens.semantic.* when a semantic role exists, or tokens.value.* for low-level enums and component-specific values."
    direct_values_allowed:
      - "tokens.value.*"
      - "tokens.naming"
      - "tokens.unit"
      - "tokens.unit_rules"
      - "tokens.reference_policy"
      - "rules.*"
      - "observations.*"
    references_required:
      - "tokens.semantic.*"
      - "tokens.component.* design values"
    direct_values_exception: "Boolean switches and non-visual enum literals may remain direct in component tokens when no useful value/semantic token exists."

  value:
