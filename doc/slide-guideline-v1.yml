          hex: "#0072B2"
          allowed_uses:
            - "status_icon"
            - "status_border"
            - "small_marker"
            - "link_like_text"
      text_on_background:
        - role: "body_on_base"
          text: "tokens.semantic.color.text.primary"
          text_hex: "#333333"
          background: "tokens.semantic.color.background.base"
          background_hex: "#FFFFFF"
          contrast_ratio: 12.63
        - role: "body_on_muted"
          text: "tokens.semantic.color.text.primary"
          text_hex: "#333333"
          background: "tokens.semantic.color.background.muted"
          background_hex: "#F7F7F7"
          contrast_ratio: 11.79
        - role: "body_on_neutral_200"
          text: "tokens.semantic.color.text.primary"
          text_hex: "#333333"
          background: "tokens.semantic.color.neutral.n200"
          background_hex: "#EEEEEE"
          contrast_ratio: 10.89
        - role: "alt_dark_on_base"
          text: "tokens.semantic.color.text.alt_dark"
          text_hex: "#1E112D"
          background: "tokens.semantic.color.background.base"
          background_hex: "#FFFFFF"
          contrast_ratio: 17.90
        - role: "inverse_on_accent"
          text: "tokens.semantic.color.text.inverse"
          text_hex: "#FFFFFF"
          background: "tokens.semantic.color.accent.magenta"
          background_hex: "#A51E6D"
          contrast_ratio: 6.99
        - role: "inverse_on_info"
          text: "tokens.semantic.color.text.inverse"
          text_hex: "#FFFFFF"
          background: "tokens.semantic.color.state.info"
          background_hex: "#0072B2"
          contrast_ratio: 5.19
        - role: "primary_on_warning"
          text: "tokens.semantic.color.text.primary"
          text_hex: "#333333"
          background: "tokens.semantic.color.state.warning"
          background_hex: "#E69F00"
          contrast_ratio: 5.61
      prohibited:
        text_on_background:
          - role: "white_on_warning"
            reason: "Below normal text contrast threshold."
          - role: "white_on_success"
            reason: "Below normal text contrast threshold."
          - role: "white_on_danger"
            reason: "Below normal text contrast threshold."

    repair_candidates:
      text:
        hue_preserving_low_contrast:
          purpose: "Automated repair for unreadable text. Preserve the original color family first, then choose a same-family color that passes contrast."
          family_selection:
            algorithm: "Find the nearest design-system palette color to the source foreground color, then use that color's family as the repair candidate family."
          families:
            neutral_black:
              - token: "text.inverse"
                hex: "#FFFFFF"
              - token: "brand.utility.off_white"
                hex: "#FEFEFE"
              - token: "brand.black.b400"
                hex: "#999999"
              - token: "brand.black.b500"
                hex: "#858585"
              - token: "brand.black.b600"
                hex: "#707070"
              - token: "text.muted"
                hex: "#666666"
              - token: "brand.black.b700"
                hex: "#5C5C5C"
              - token: "brand.black.b800"
                hex: "#474747"
              - token: "text.primary"
                hex: "#333333"
              - token: "text.alt_dark"
                hex: "#1E112D"
              - token: "brand.utility.black"
                hex: "#000000"
            red:
              - token: "brand.gradient.red"
                hex: "#FF5757"
              - token: "brand.gradient.red_deep"
                hex: "#E6033D"
              - token: "state.danger"
                hex: "#D55E00"
            magenta:
              - token: "brand.primary.p500"
                hex: "#C978A7"
              - token: "brand.primary.p600"
                hex: "#C06299"
              - token: "brand.primary.p700"
                hex: "#B74B8A"
              - token: "brand.primary.p800"
                hex: "#AE357C"
              - token: "accent.magenta"
                hex: "#A51E6D"
            blue:
              - token: "data_series.series_7"
                hex: "#56B4E9"
              - token: "brand.gradient.cyan"
                hex: "#32BED2"
              - token: "state.info"
                hex: "#0072B2"
            green:
              - token: "brand.secondary.s500"
                hex: "#68BFAE"
              - token: "brand.secondary.s600"
                hex: "#4FB5A1"
              - token: "brand.secondary.s700"
                hex: "#35AA93"
              - token: "brand.secondary.s800"
                hex: "#1CA086"
              - token: "brand.secondary.s900"
                hex: "#039578"
              - token: "state.success"
                hex: "#009E73"
          selection:
            algorithm: "Within the selected family, choose the closest color to the source foreground that meets the required contrast ratio."
            fallback: "If no same-family color passes, fall back to the neutral_black family and choose the closest passing neutral."
        inverse_text_low_contrast:
          purpose: "Repair text that is intended to remain inverse text on dark/accent/status backgrounds."
          candidate_order:
            - role: "inverse"
              color: "tokens.semantic.color.text.inverse"
              token: "text.inverse"
              hex: "#FFFFFF"
            - role: "off_white"
              color: "tokens.semantic.color.brand.utility"
              token: "brand.utility.off_white"
              hex: "#FEFEFE"
          selection:
            algorithm: "Use only when the background role is dark/accent/status and inverse text is semantically valid."
        emphasis_text_low_contrast:
          purpose: "Repair emphasized or link-like text only when the source role is already emphasis, state, or link-like."
          candidate_order:
            - role: "accent_magenta"
              color: "tokens.semantic.color.accent.magenta"
              token: "accent.magenta"
              hex: "#A51E6D"
            - role: "info"
              color: "tokens.semantic.color.state.info"
              token: "state.info"
              hex: "#0072B2"
          selection:
            algorithm: "Do not use for ordinary body text. Use only when the source role or component context indicates emphasis/link/status."

    contrast_gate:
      enabled: true
      source_of_truth: "rules.accessibility.contrast_ratio_min"

    accent_area_ratio_max: 0.10
    accent_area:
      ratio_max_per_slide: "rules.color.accent_area_ratio_max"
      counted_roles:
        - "tokens.semantic.color.accent.magenta"
        - "tokens.semantic.color.state.success"
        - "tokens.semantic.color.state.warning"
        - "tokens.semantic.color.state.danger"
        - "tokens.semantic.color.state.info"
      excluded_roles:
        - "tokens.semantic.color.text.primary"
        - "tokens.semantic.color.text.muted"
        - "tokens.semantic.color.border.default"
      review_threshold_ratio: 0.08

