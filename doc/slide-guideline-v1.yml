    checks:
      slide_size:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.slide_size"
        detection: "Warn only when the PPTX canvas is not proportional to rules.slide.size_pt; proportional 16:9 decks are normalized before other checks."
      overflow_text:
        severity: "error"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.overflow_text"
        multi_step_candidates:
          ordered_strategies:
            - "shrink_height"
            - "move"
            - "shrink_font_size"
            - "compress_line_height"
          rationale: "Reviewer chooses minimal-disruption step first; pptx_fix.py supports each via bbox_fit / font_size / line_height rules."
      overflow_shapes:
        severity: "error"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.overflow_shapes"
      overflow_images:
        severity: "error"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.overflow_images"
        exception: "Template/decorative rasters named or described as background/header/footer/gradient/decoration assets are excluded."
      text_overlap:
        severity: "error"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.text_overlap"
        detection: "Detect normalized text-frame bbox pairs whose intersection area is greater than 1pt²."
        thresholds:
          overlap_area_pt2_min_exclusive: 1
        multi_step_candidates:
          ordered_strategies:
            - "move_shape_b"
            - "shrink_font_size"
            - "shrink_shape_b_height"
          rationale: "Nudge shape_b first; if overlap persists, smaller font on the dominant shape or shape_b height shrink are the next steps."
      object_overlap:
        severity: "error"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.object_overlap"
        detection: "Detect normalized bbox pairs with at least one non-text object whose intersection area is greater than 1pt², excluding structural containment relationships emitted by structure metadata."
        thresholds:
          overlap_area_pt2_min_exclusive: 1
          structural_containment_overlap_ratio_min: 0.9
      safe_margins:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.safe_margins"
        exception: "Cover-slide brand marks in the upper-left cover area and template/decorative rasters are excluded from normal content safe-margin checks."
      object_gap_too_small:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.object_gap_too_small"
        detection: "Detect adjacent normalized object bboxes whose horizontal or vertical gap is below max(element_gap_pt_min by ds:element, semantic_pair_gap_pt_min by inferred title_subtitle / label_group pair) while the opposite axis overlaps. Missing or unknown elements default to 0 and do not warn unless a semantic pair is detected."
        thresholds:
          default_adjacent_gap_pt_min: "rules.slide.object_spacing.default_adjacent_gap_pt_min"
          element_gap_pt_min: "rules.slide.object_spacing.element_gap_pt_min"
          semantic_pair_gap_pt_min: "rules.slide.object_spacing.semantic_pair_gap_pt_min"
      safe_text_area_text:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.safe_text_area_text"
        detection: "Apply content safe text area to body text. Exclude cover and section divider slide types, template header titles, footers/page numbers, and approved full-width template subtitle text."
      font_family:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.font_family"
      font_size_scale:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.font_size_scale"
      line_height:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.line_height"
      text_autofit_disabled:
        severity: "error"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.text_autofit_disabled"
      animation_present:
        severity: "error"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.animation_present"
      alignment_left_top:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.alignment_left_top"
      text_color_allowlist:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.text_color_allowlist"
      background_color_palette:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.background_color_palette"
      image_upscale_ratio:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.image_upscale_ratio"
        detection: "Compare picture source pixel size with displayed PPTX size converted at 96px/in; warn above tokens.value.imagery.avoid_upscale_over_ratio. Exclude explicit template/decorative rasters such as gradient/header/background assets."
      image_aspect_distortion:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.image_aspect_distortion"
        detection: "Compare picture source aspect ratio with displayed box aspect ratio; warn when the relative delta exceeds 5%. Exclude explicit template/decorative rasters such as gradient/header/background assets."
      low_contrast:
        severity: "error"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.low_contrast"
        detection: "With --rendered-image-dir, measure final PowerPoint-rendered pixels inside text bboxes and emit error when the inferred foreground/background ratio is below 3.0:1. Without rendered images, fall back to explicit RGB text color against solid fills or white slide background; unknown/image/gradient backgrounds remain manual review."
      contrast_ratio:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.contrast_ratio"
        detection: "With --rendered-image-dir, measure final PowerPoint-rendered pixels inside text bboxes and warn below rules.accessibility.contrast_ratio_min. Without rendered images, fall back to explicit RGB text color against solid fills or white slide background; unknown/image/gradient backgrounds remain manual review."
      color_only_meaning:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.color_only_meaning"
        detection: "Detect nearby same-size unlabeled shapes whose only machine-visible differentiator is fill color; emit a risk finding requiring non-color cue repair."
      heading_hierarchy_broken:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.heading_hierarchy_broken"
        detection: "Use normalized geometry and dominant font size as an automated proxy for design-system title/body hierarchy; warn when body text visually outranks the title slot or title ordering is inconsistent."
      key_area_cropped:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.key_area_cropped"
        detection: "Read picture crop metadata and warn when non-decorative image crop exceeds conservative side or axis-total thresholds."
      missing_required_element:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.missing_required_element"
        detection: "For non-empty slides, detect absence of a title/header candidate in the normalized top title zone."
      alt_text_required:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.alt_text_required"
        detection: "Check picture objects for non-empty PowerPoint alt text title or description; decorative exceptions require manual confirmation."
      reading_order:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.reading_order"
        detection: "Compare text shape source order with normalized top-left visual order and warn when inversion count exceeds threshold."
      wrap_break_changes_meaning:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.wrap_break_changes_meaning"
        detection: "Inspect explicit authored line breaks and warn when they split Latin words, numbers and units, bracket punctuation, or short fragments."
      geometry_rounding:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.geometry_rounding"
      inner_padding_imbalance:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.inner_padding_imbalance"
        detection: "Detect design-system container elements with at least two child objects whose internal padding does not match the component padding rule. Missing or unknown ds:element containers use default 0 and do not warn."
        thresholds:
          child_count_min: 2
          default_inner_padding_pt: 0
          element_inner_padding_pt:
            default: 0
            card: "tokens.component.card.padding_pt"
            callout: "tokens.component.callout.padding_pt"
          padding_target_tolerance_pt: 4
          padding_policy: "left/top should match the component padding target within tolerance; right/bottom must not be below the target. Cases requiring child resize or semantic regrouping are manual."
      decorative_isolated_lines:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.decorative_isolated_lines"
        detection: "Detect MSO_SHAPE_TYPE.LINE / arrow- or line-named auto_shape / very thin rectangles (thickness<=4pt, length>=20pt) whose nearest neighbor bbox gap is >=24pt. Emit a decorative_review finding with fixability=decorative_review; auto removal is never proposed."
        thresholds:
          proximity_pt_max: 24.0
          thin_bar_thickness_pt_max: 4.0
          thin_bar_length_pt_min: 20.0
      badge_alignment:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.badge_alignment"
        detection: "Detect shapes with a solid fill, short single-line text (length<=20), and a near-square / pill bounding box (aspect ratio between 0.5 and 2.5, max width 240pt, max height 120pt) whose paragraph alignment is not CENTER or whose text-frame vertical anchor is not MIDDLE. Emit an auto_fix_candidate with candidate_values={alignment:CENTER, vertical_anchor:MIDDLE}; alignment_left_top is suppressed on these shapes."
        thresholds:
          shape_max_width_pt: 240.0
          shape_max_height_pt: 120.0
          aspect_ratio_min: 0.5
          aspect_ratio_max: 2.5
          text_length_max: 20
      card_grid_consistency:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.card_grid_consistency"
        detection: "Detect repeated card containers in the same row whose container size, top position, padding, first-child relative placement, or same-role child text placement differs from the row median beyond tolerance."
        thresholds:
          group_min: 2
          child_count_min: 2
          row_center_tolerance_pt: 36
          top_tolerance_pt: 4
          size_tolerance_pt: 6
          padding_tolerance_pt: 8
          first_child_relative_tolerance_pt: 14
      text_vertical_balance:
        severity: "warning"
        automation: "automated"
        priority_catalog: "rules.lint.priority_catalog.text_vertical_balance"
        evaluation_axes:
          - "font_size"
          - "line_height"
          - "text_box_height"
          - "internal_margin"
          - "vertical_anchor"
        detection: "Detect text boxes where content fits but internal vertical padding or visual center is unbalanced. Combines the 5 evaluation axes; warn when free vertical space, asymmetric internal padding, or visual-center offset exceeds thresholds defined in pptx_lint.py."
        scope: "Visible text containers only; invisible text boxes without fill or stroke are selection geometry and are not evaluated as visual containers."
        thresholds:
          dead_space_ratio_max: 0.40
          top_or_bottom_dead_space_pt_max: 60
          middle_anchor_padding_asymmetry_pt_max: 12
          visual_center_offset_ratio_max: 0.20
          min_box_height_pt: 30
        fix_strategy:
          equal_options:
            - "font_size_change"
            - "text_box_size_change"
          principle: "フォントサイズ変更とテキストボックスサイズ変更は対等な選択肢として扱い、片方を他方に内包させない。anchor、line height、internal margin と合わせて 5 軸で再設計する。"
          excluded_from_auto_fix: true

    # ========================================================================
    # rules.lint.fix_policy
    # ------------------------------------------------------------------------
    # lint で検出される各 check に対する fix の取り扱い方針を宣言する単一の
    # 正本テーブル。pptx_lint.py の _fixability_for_json、pptx_fix.py の
    # CHECK_TO_RULE / FINDING_DRIVEN_RULES、pptx_review_priorities.py が
    # 共通でここを参照する想定 (refactor 段階 2 以降で実装側を切替)。
    #
    # apply_mode:
    #   - auto_fix       : lint が常に auto_fix_candidate を発行し、pptx_fix
    #                      が即適用できる ("無条件で機械修正可" な mechanical
    #                      系)。
    #   - judgement_fix  : lint は manual_required (場合により
    #                      auto_fix_candidate) を発行し、candidate_values も
    #                      併走で出す。SPA で finding 単位の
    #                      judgement_reason=auto_fixable が付与された
    #                      finding のみ pptx_fix が apply する。REV-017 など
    #                      の deck-level adopt/reject はこの apply の「後段」
    #                      のレビューに位置づけられる (= apply ↔ adopt は
    #                      異なるレイヤー)。
    #   - no_fix         : 機械修正経路そのものが無い。lint 検出のみで終わる
    #                      ("manual" は紛らわしいので no_fix とした)。原則
    #                      として content / semantic / 素材入手が必要なもの、
    #                      もしくは誤適用リスクが高いため機械修正を提案しな
    #                      いと決めたもの。
    #
    # fix_rule: pptx_fix.py 側に登録された rule 名。apply_mode=no_fix のとき
    #          は null。
    #
    # 段階 1: YAML 正本テーブルとして列挙のみ。
    # 段階 2: pptx_lint.py / pptx_fix.py がここを参照するよう refactor (完)。
    # 段階 3: 「apply_mode=judgement_fix は judgement 不在で apply しない」
    #         厳格化 (仕様変更が伴うため別議論)。
    # ========================================================================
    fix_policy:
      text_autofit_disabled:
        apply_mode: auto_fix
        fix_rule: autofit
      font_size_scale:
        apply_mode: auto_fix
        fix_rule: font_size
      line_height:
        apply_mode: auto_fix
        fix_rule: line_height
      alignment_left_top:
        apply_mode: auto_fix
        fix_rule: alignment
      badge_alignment:
        apply_mode: auto_fix
        fix_rule: badge_alignment
      geometry_rounding:
        apply_mode: judgement_fix
        fix_rule: geometry
        note: "drift が 0.1pt 未満なら lint 側で auto_fix_candidate に昇格 (実装条件)。"
      low_contrast:
        apply_mode: judgement_fix
        fix_rule: contrast
      contrast_ratio:
        apply_mode: judgement_fix
        fix_rule: contrast
      font_family:
        apply_mode: judgement_fix
        fix_rule: font_family
      text_color_allowlist:
        apply_mode: judgement_fix
        fix_rule: text_color
      background_color_palette:
        apply_mode: judgement_fix
        fix_rule: fill_color
      overflow_text:
        apply_mode: judgement_fix
        fix_rule: bbox_fit
      overflow_shapes:
        apply_mode: judgement_fix
        fix_rule: bbox_fit
      overflow_images:
        apply_mode: judgement_fix
        fix_rule: bbox_fit
      safe_margins:
        apply_mode: judgement_fix
        fix_rule: bbox_fit
      safe_text_area_text:
        apply_mode: judgement_fix
        fix_rule: bbox_fit
      text_overlap:
        apply_mode: judgement_fix
        fix_rule: overlap
      object_overlap:
        apply_mode: judgement_fix
        fix_rule: overlap
      object_gap_too_small:
        apply_mode: judgement_fix
        fix_rule: spacing
      image_aspect_distortion:
        apply_mode: judgement_fix
        fix_rule: image_aspect
      key_area_cropped:
        apply_mode: judgement_fix
        fix_rule: image_crop
      reading_order:
        apply_mode: judgement_fix
        fix_rule: reading_order
      animation_present:
        apply_mode: judgement_fix
        fix_rule: animation
      wrap_break_changes_meaning:
        apply_mode: judgement_fix
        fix_rule: text_wrap
        note: "widen_to_fit candidate あれば lint 側で auto_fix_candidate に昇格。"
      heading_hierarchy_broken:
        apply_mode: judgement_fix
